name: Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Build even when upstream has no new commit'
        required: false
        type: boolean
        default: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout your repo (for Dockerfile.unraid)
        uses: actions/checkout@v4
        with:
          path: myrepo

      - name: Clone upstream repo
        run: |
          git clone https://github.com/clusterzx/ts6-manager.git upstream

      - name: Detect upstream changes
        id: upstream-check
        shell: bash
        run: |
          set -euo pipefail
          upstream_sha="$(git -C upstream rev-parse HEAD)"
          if [[ -f "myrepo/.last_upstream_sha" ]]; then
            previous_sha="$(cat myrepo/.last_upstream_sha)"
          else
            previous_sha=""
          fi

          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"

          if [[ "$upstream_sha" != "$previous_sha" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream changed: $previous_sha -> $upstream_sha"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes detected."
          fi

      - name: Copy Dockerfile.unraid into upstream source
        if: steps.upstream-check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.force_build == 'true'
        run: |
          cp myrepo/Dockerfile.unraid upstream/Dockerfile.unraid

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.upstream-check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.force_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push – Single Container
        if: steps.upstream-check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' && github.event.inputs.force_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: upstream
          file: upstream/Dockerfile.unraid
          push: true
          tags: |
            ghcr.io/kabelsalatundklartext/ts6-manager:latest
            ghcr.io/kabelsalatundklartext/ts6-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Persist last upstream SHA
        if: steps.upstream-check.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.upstream-check.outputs.upstream_sha }}" > myrepo/.last_upstream_sha
          cd myrepo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last_upstream_sha
          git commit -m "chore(ci): track last upstream sha" || exit 0
          git push
