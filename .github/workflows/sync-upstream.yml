name: Sync Upstream & Build Docker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout your repo (for Dockerfile.unraid)
        uses: actions/checkout@v4
        with:
          path: myrepo

      - name: Clone upstream repo
        run: |
          git clone https://github.com/clusterzx/ts6-manager.git upstream

      - name: Copy Dockerfile.unraid into upstream source
        run: |
          cp myrepo/Dockerfile.unraid upstream/Dockerfile.unraid

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push – Single Container
        uses: docker/build-push-action@v5
        with:
          context: upstream
          file: upstream/Dockerfile.unraid
          push: true
          tags: |
            ghcr.io/kabelsalatundklartext/ts6-manager:latest
            ghcr.io/kabelsalatundklartext/ts6-manager:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
