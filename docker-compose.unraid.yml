version: "3.8"

services:
  backend:
    image: ghcr.io/kabelsalatundklartext/ts6-manager-backend:latest
    container_name: ts6-manager-backend
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=3001
      - DATABASE_URL=file:/data/ts6webui.db
      - FRONTEND_URL=http://localhost:3000
      - MUSIC_DIR=/data/music
    volumes:
      - /mnt/user/appdata/ts6-manager/data:/data
    networks:
      - ts6-net

  frontend:
    image: ghcr.io/kabelsalatundklartext/ts6-manager-frontend:latest
    container_name: ts6-manager-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ts6-net

networks:
  ts6-net:
    driver: bridge
