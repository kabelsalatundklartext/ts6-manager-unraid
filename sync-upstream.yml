name: Sync Upstream & Build Docker

on:
  schedule:
    # Checks for updates every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/clusterzx/ts6-manager.git || true
          git fetch upstream

      - name: Merge upstream main
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BEFORE=$(git rev-parse HEAD)
          git merge upstream/main --no-edit --allow-unrelated-histories || true
          AFTER=$(git rev-parse HEAD)

          if [ "$BEFORE" != "$AFTER" ]; then
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "✅ New changes from upstream merged!"
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Already up to date."
          fi

      - name: Push merged changes
        if: steps.sync.outputs.updated == 'true'
        run: git push origin main

  build-and-push:
    needs: sync
    if: needs.sync.outputs.updated == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/ts6-manager
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/kabelsalatundklartext/ts6-manager-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/kabelsalatundklartext/ts6-manager-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
